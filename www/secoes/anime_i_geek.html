    function navegarParaLink(linkArtigo, docId) {
        try {
            const linkLimpo = (linkArtigo || "").trim();
            
            if (!linkLimpo) {
                window.location.href = `index.html?id=${encodeURIComponent(docId)}`;
                return;
            }
            
            if (linkLimpo.includes("secao=")) {
                const idExtraido = linkLimpo.split("secao=")[1].split("&")[0];
                if (typeof window.abrirAbaPorId === 'function') {
                    window.abrirAbaPorId(idExtraido);
                } else {
                    window.location.href = `index.html?secao=${encodeURIComponent(idExtraido)}`;
                }
                return;
            }
            
            window.location.href = linkLimpo;
            
        } catch (error) {
            console.error('Erro ao navegar:', error);
            window.location.href = `index.html?id=${encodeURIComponent(docId)}`;
        }
    }
    
    async function carregarConteudo() {
        const mainContainer = document.getElementById("dynamic-sections");
        
        if (!mainContainer || mainContainer.dataset.loaded === "true") return;
        mainContainer.dataset.loaded = "true";
        
        console.log(`[INIT] 🔄 Iniciando carregamento...`);
        mainContainer.innerHTML = "";
        
        let totalExibido = 0;
        
        for (const conf of configSessoes) {
            try {
                // 🔍 Valida se a subcoleção existe na lista mestre
                if (!TODAS_SUBCOLECOES.includes(conf.sub)) {
                    console.warn(`[⚠️] Subcoleção "${conf.sub}" não encontrada em TODAS_SUBCOLECOES. Verifique o nome.`);
                    continue;
                }
                
                console.log(`[SESSÃO] 📁 Carregando: ${conf.titulo} (${conf.sub})`);
                
                const colRef = collection(
                    db,
                    "anigeeknews.web.app/animes_filmes_series_games_noticias/" + conf.sub
                );
                
                const q = query(colRef, limit(conf.qtd));
                const snap = await getDocs(q);
                
                console.log(`[SESSÃO] ✅ ${conf.sub}: ${snap.size} documentos`);
                
                if (snap.empty) continue;
                
                const section = document.createElement("section");
                section.className = "content-section";
                section.innerHTML = `
                    <h2 class="section-title">${conf.titulo}</h2>
                    <div class="cards-row"></div>
                `;
                mainContainer.appendChild(section);
                
                const row = section.querySelector(".cards-row");
                let count = 0;
                
                snap.forEach(doc => {
                    const data = doc.data();
                    const docId = doc.id;
                    
                    // ✅ Campos com fallbacks seguros
                    const cardTitulo = (data.homeConfig?.cardTitle || "").trim() || docId.replace(/_/g, " ");
                    const cardCat = (data.categoria || "").trim() || "Série";
                    const cardImg = (data.homeConfig?.cardImg || "").trim() || "https://via.placeholder.com/640x360?text=AniGeek+TV";
                    const linkArtigo = (data.homeConfig?.redirectLink || "").trim();
                    
                    const card = document.createElement("div");
                    card.className = "anime-card";
                    card.dataset.link = linkArtigo;
                    card.dataset.docId = docId;
                    card.setAttribute("role", "button");
                    card.setAttribute("tabindex", "0");
                    
                    card.innerHTML = `
                        <div class="poster-wrapper">
                            <img
                                src="${cardImg}"
                                class="poster-img"
                                loading="lazy"
                                alt="${cardTitulo}"
                                onerror="this.src='https://via.placeholder.com/640x360?text=Imagem+Indisponivel'"
                            >
                        </div>
                        <div class="anime-title">${cardTitulo}</div>
                        <div class="anime-meta">${cardCat}</div>
                    `;
                    
                    card.addEventListener("click", (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        navegarParaLink(card.dataset.link, card.dataset.docId);
                    });
                    
                    card.addEventListener("keydown", (e) => {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            card.click();
                        }
                    });
                    
                    row.appendChild(card);
                    count++;
                    totalExibido++;
                });
                
                console.log(`[SESSÃO] 📊 ${conf.titulo}: ${count} cards exibidos`);
                
            } catch (e) {
                console.error(`[ERRO] ❌ Falha em "${conf.sub}":`, e);
            }
        }
        
        console.log(`[FINAL] ✅ Concluído: ${totalExibido} cards no total`);
    }
    
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", carregarConteudo);
    } else {
        carregarConteudo();
